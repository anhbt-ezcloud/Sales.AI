</main>

    source: 'System', time: '3 ngày trước', unread: false,
    actionLabel: null, actionHref: null,
  },
];

let activeFilter = 'all';
let searchQuery = '';
let sortAsc = false;

// ========== RENDER ==========
function renderNotifications() {
  let data = [...NOTIFICATIONS];

  // Search filter
  if (searchQuery) {
    data = data.filter(n => n.title.toLowerCase().includes(searchQuery) || n.body.toLowerCase().includes(searchQuery));
  }

  // Status filter
  if (activeFilter === 'unread') data = data.filter(n => n.unread);

  // Sort
  if (sortAsc) data.reverse();

  // Group
  const groups = {};
  data.forEach(n => {
    if (!groups[n.group]) groups[n.group] = [];
    groups[n.group].push(n);
  });

  const unreadCount = NOTIFICATIONS.filter(n => n.unread).length;
  document.getElementById('countAll').textContent = data.length;
  document.getElementById('countUnread').textContent = unreadCount;
  document.getElementById('notifSubtitle').textContent =
    `Hiển thị ${data.length} thông báo${searchQuery ? ' (đã lọc)' : ''}`;

  document.getElementById('notifList').innerHTML = Object.entries(groups).map(([group, items]) => `
    <div class="flex flex-col gap-3 fade-in">
      <div class="flex items-center gap-4">
        <h2 class="text-xs font-bold text-outline uppercase tracking-widest whitespace-nowrap">${group}</h2>
        <div class="h-px w-full bg-outline-variant/30"></div>
      </div>
      ${items.map((n, idx) => renderCard(n, idx)).join('')}
    </div>`).join('');

  // Attach mark-read events
  document.querySelectorAll('.mark-read-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const card = e.currentTarget.closest('.notif-card');
      const id = +e.currentTarget.dataset.id;
      NOTIFICATIONS[id].unread = false;
      card.classList.add('read');
      card.querySelector('.unread-dot')?.remove();
      e.currentTarget.remove();
      document.getElementById('countUnread').textContent = NOTIFICATIONS.filter(n => n.unread).length;
      document.getElementById('urgCount').textContent = NOTIFICATIONS.filter(n => n.unread && n.urgency === 'urgent').length;
    });
  });
}

function renderCard(n, localIdx) {
  const globalIdx = NOTIFICATIONS.indexOf(n);
  return `
    <div class="notif-card group relative bg-surface-container-lowest rounded-xl border-l-4 ${n.borderColor}
                shadow-sm hover:shadow-md transition-all p-4 flex gap-4 ${n.unread ? '' : 'read'}">
      <div class="w-12 h-12 rounded-full ${n.iconBg} flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined ${n.iconColor}" style="font-variation-settings:'FILL' 1;">${n.icon}</span>
      </div>
      <div class="flex-1 flex flex-col gap-1 min-w-0">
        <div class="flex justify-between items-start gap-2">
          <h4 class="text-sm font-semibold text-on-surface leading-snug">${n.title}</h4>
          <span class="text-[11px] text-outline bg-surface-container-high px-2 py-0.5 rounded uppercase font-bold tracking-tighter whitespace-nowrap flex-shrink-0">${n.source}</span>
        </div>
        <p class="text-sm text-on-surface-variant leading-relaxed">${n.body}</p>
        <div class="flex items-center gap-4 mt-2 flex-wrap">
          ${n.actionLabel ? `<a href="${n.actionHref || '#'}"
             class="px-4 py-1.5 bg-primary text-white text-xs font-bold rounded-lg
                    hover:bg-primary-container transition-colors shadow-sm">${n.actionLabel}</a>` : ''}
          <span class="text-xs text-outline flex items-center gap-1">
            <span class="material-symbols-outlined text-xs">schedule</span>${n.time}
          </span>
          ${n.unread ? `<button class="mark-read-btn text-xs text-outline hover:text-primary transition-colors" data-id="${globalIdx}">
            Đánh dấu đã đọc
          </button>` : `<span class="text-xs text-outline italic">Đã đọc</span>`}
        </div>
      </div>
      <div class="flex flex-col items-end gap-2 flex-shrink-0">
        ${n.unread ? '<div class="unread-dot w-2.5 h-2.5 bg-primary rounded-full" style="box-shadow:0 0 8px rgba(53,37,205,.4)"></div>' : ''}
        <div class="opacity-0 group-hover:opacity-100 transition-opacity">
          <button onclick="deleteNotif(this)" class="p-1 hover:bg-surface-container rounded-md text-outline-variant hover:text-on-surface">
            <span class="material-symbols-outlined text-sm">more_vert</span>
          </button>
        </div>
      </div>
    </div>`;
}

// ========== MARK ALL READ ==========
function markAllRead() {
  NOTIFICATIONS.forEach(n => n.unread = false);
  showToast('Đã đánh dấu tất cả thông báo là đã đọc!');
  renderNotifications();
}

// ========== DELETE (more_vert stub) ==========
function deleteNotif(btn) {
  showToast('Đã xóa thông báo!');
  btn.closest('.notif-card').remove();
}

// ========== FILTER BUTTONS ==========
document.getElementById('statusFilters').addEventListener('click', e => {
  const btn = e.target.closest('button[data-filter]');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('#statusFilters .filter-btn').forEach(b => {
    b.classList.remove('bg-indigo-50', 'text-primary', 'font-medium');
    b.classList.add('text-slate-600');
  });
  btn.classList.add('bg-indigo-50', 'text-primary', 'font-medium');
  btn.classList.remove('text-slate-600');
  renderNotifications();
});

document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-indigo-50', 'text-primary'));
    btn.classList.toggle('bg-indigo-50');
    btn.classList.toggle('text-primary');
    showToast(`Lọc theo: ${btn.textContent.trim()}`);
  });
});

function filterByUrgency(btn) {
  document.querySelectorAll('.urgency-btn').forEach(b => b.classList.remove('bg-indigo-50', 'text-primary'));
  btn.classList.toggle('bg-indigo-50');
  btn.classList.toggle('text-primary');
}

// ========== SEARCH ==========
document.getElementById('notifSearch').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderNotifications();
});

// ========== SORT ==========
let sortMode = 'new';
function toggleSort() {
  sortMode = sortMode === 'new' ? 'old' : 'new';
  sortAsc = sortMode === 'old';
  document.getElementById('sortLabel').textContent = sortMode === 'new' ? 'Mới nhất' : 'Cũ nhất';
  renderNotifications();
}

// ========== RESET ==========
function resetFilters() {
  activeFilter = 'all';
  searchQuery = '';
  sortAsc = false;
  sortMode = 'new';
  document.getElementById('sortLabel').textContent = 'Mới nhất';
  document.getElementById('notifSearch').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('bg-indigo-50', 'text-primary', 'font-medium');
    b.classList.add('text-slate-600');
  });
  document.getElementById('statusFilters').querySelector('[data-filter="all"]').classList.add('bg-indigo-50', 'text-primary', 'font-medium');
  document.querySelectorAll('.type-btn, .urgency-btn').forEach(b => b.classList.remove('bg-indigo-50', 'text-primary'));
  renderNotifications();
  showToast('Đã xóa toàn bộ bộ lọc!');
}

// ========== TOAST ==========
function showToast(msg, type = 'success') {
  const colors = type === 'error' ? 'bg-error text-white' : 'bg-inverse-surface text-inverse-on-surface';
  const t = document.createElement('div');
  t.className = `pointer-events-auto toast-anim flex items-center gap-2 px-5 py-3 rounded-xl shadow-xl text-sm font-medium ${colors} opacity-0 transition-opacity`;
  t.innerHTML = `<span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">check_circle</span>${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  requestAnimationFrame(() => t.classList.replace('opacity-0', 'opacity-100'));
  setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => t.remove(), 300); }, 2800);
}

// ========== INIT ==========
renderNotifications();
</script>
</body>
</html>
